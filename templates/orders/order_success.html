{% extends 'base.html' %}

{% block title %}Order Placed - MediCart{% endblock %}

{% block content %}
<div class="row justify-content-center text-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg p-5">
            <div class="mb-4">
                <i class="fas fa-check-circle text-success display-1"></i>
            </div>
            <h1 class="display-4 fw-bold text-success mb-3">Order Successful!</h1>
            <p class="lead text-muted mb-4">Thank you for your purchase. Your order has been placed successfully.</p>

            <div class="alert alert-info rounded-pill mb-4">
                <i class="fas fa-info-circle me-2"></i>Payment of <strong>₹{{ total_amount }}</strong> is simulated as
                successful.
            </div>

            <div class="d-grid gap-2 d-sm-flex justify-content-center">
                <a href="{% url 'order_history' %}" class="btn btn-primary btn-lg rounded-pill px-4 shadow">
                    <i class="fas fa-history me-2"></i>View Order
                </a>
                <a href="{% url 'medicine_list' %}" class="btn btn-outline-primary btn-lg rounded-pill px-4">
                    Continue Shopping
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
