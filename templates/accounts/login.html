{% extends 'base.html' %}
{% load static %}

{% block title %}Login - MediCart{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center text-primary mb-4">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                </form>
                <p class="mt-3 text-center">
                    New to MediCart? <a href="{% url 'register' %}" class="fw-bold">Create Account</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script>
    // Add Bootstrap classes to form fields
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => input.classList.add('form-control'));
</script>
{% endblock %}
