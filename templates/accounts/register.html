{% extends 'base.html' %}

{% block title %}Register - MediCart{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center text-primary mb-4">
                    <i class="fas fa-user-plus me-2"></i>Register
                </h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        <div class="form-text text-muted">{{ field.help_text }}</div>
                        {% if field.errors %}
                        <div class="text-danger small">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 py-2">Register</button>
                </form>
                <p class="mt-3 text-center">
                    Already have an account? <a href="{% url 'login' %}" class="fw-bold">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script>
    // Add Bootstrap classes to form fields
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => input.classList.add('form-control'));
    const selects = document.querySelectorAll('select');
    selects.forEach(select => select.classList.add('form-select'));
</script>
{% endblock %}
